<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Year 4 — Chapters by Naman Kaur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="blog.css" />
</head>
<body>

  <!-- Reading progress bar — fills as you scroll the article -->
  <div class="reading-progress" id="readingProgress"></div>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar" id="navbar">
    <a href="public/index.html" class="nav-logo">Chapters ✦</a>
    <div class="nav-links">
      <a href="../index.html#hero"     class="nav-link">home</a>
      <a href="../index.html#timeline" class="nav-link">timeline</a>
      <a href="../index.html#gallery"  class="nav-link">gallery</a>
      <a href="../index.html#blog"     class="nav-link active">blog</a>
      <a href="../index.html#connect"  class="nav-link">connect</a>
    </div>
    <button class="nav-hamburger" id="navHamburger" aria-label="open menu">
      <i class="ti ti-menu-2"></i>
    </button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="../index.html"          class="mobile-link">home</a>
    <a href="../index.html#timeline" class="mobile-link">timeline</a>
    <a href="../index.html#gallery"  class="mobile-link">gallery</a>
    <a href="../index.html#blog"     class="mobile-link">blog</a>
    <a href="../index.html#connect"  class="mobile-link">connect</a>
  </div>

  <!-- ===================== HERO BANNER ===================== -->
  <div class="blog-hero">
    <a href="../index.html#blog" class="blog-back">
      <i class="ti ti-arrow-left"></i> Back to all posts
    </a>
    <span class="blog-year-badge">Year 4 · 2026–2027</span>
    <h1>Coming Soon...</h1>
    <div class="blog-meta-row">
      <span><i class="ti ti-calendar"></i> August 2026</span>
      <span><i class="ti ti-clock"></i> 7 min read</span>
      <span><i class="ti ti-tag"></i> reflection, fullstack, design</span>
    </div>
  </div>

  <!-- ===================== ARTICLE ===================== -->
  <article class="blog-body">
  </article>
  <!-- ===================== PREV / NEXT ===================== -->
  <nav class="blog-nav" aria-label="blog navigation">
    <a href="year3.html" class="blog-nav-card">
      <p class="blog-nav-dir">← Previous post</p>
      <p class="blog-nav-title">The year I began finding myself again </p>
    </a>
    <!-- No next post — this is the final one -->
    <div class="blog-nav-empty"></div>
  </nav>

  <!-- ===================== FOOTER ===================== -->
  <footer class="blog-footer">
    <a href="../index.html">← Back to Chapters</a>
    <span>Naman Kaur · 2026</span>
  </footer>

  <!-- ===================== JAVASCRIPT ===================== -->
  <script>
    // Navbar scroll shadow
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', function () {
      navbar.classList.toggle('scrolled', window.scrollY > 10);

      // Reading progress bar
      const progress   = document.getElementById('readingProgress');
      const scrolled   = window.scrollY;
      const scrollable = document.body.scrollHeight - window.innerHeight;
      progress.style.width = ((scrolled / scrollable) * 100) + '%';
    });

    // Mobile hamburger
    const hamburger  = document.getElementById('navHamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', function () {
      mobileMenu.classList.toggle('open');
    });
    mobileMenu.querySelectorAll('.mobile-link').forEach(function (link) {
      link.addEventListener('click', function () {
        mobileMenu.classList.remove('open');
      });
    });
  </script>

</body>
</html>
